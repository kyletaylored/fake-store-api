# Cloud Run multi-container (sidecar) deployment for fake-store-api.
#
# IMPORTANT — differences from docker-compose.yml:
# - All containers in a Cloud Run revision share one network namespace and
#   talk to each other over `localhost`, not by service/container name. That's
#   why DB_HOST/DD_AGENT_HOST below are "localhost", while docker-compose.yml
#   uses "db"/"datadog-agent".
# - Cloud Run has no persistent disks. The `db` container's data directory is
#   backed by an in-memory `emptyDir` volume: Mongo data does NOT survive
#   instance restarts, revisions, or scale-to-zero. Acceptable here because
#   this is a fake-data demo API — for anything real, use MongoDB Atlas or a
#   separately hosted Mongo instance instead of this sidecar.
# - Env vars below are plain values, not Secret Manager references - fine for
#   a demo. Fill in DD_API_KEY with a real value (edit this file, or
#   `gcloud run services update fake-store-api --update-env-vars=DD_API_KEY=...`
#   after deploying). DD_API_KEY can't be left empty - the Datadog Agent
#   image's own startup script hard-exits if it's unset/empty, which - since
#   datadog-agent is a startup dependency for `app` - blocks the whole
#   revision from ever becoming ready. REPLACE_ME unblocks deploys but sends
#   no real telemetry until swapped for a real key.
# - /chat talks to a Vertex AI Agent Engine resource (AGENT_ENGINE_RESOURCE_NAME
#   below) via Application Default Credentials - no API key. On Cloud Run,
#   ADC comes from the service's attached runtime service account, which needs
#   roles/aiplatform.user (or equivalent) on that Agent Engine resource. See
#   docs/cloud-run-deploy.md for the exact grant command and whether it's been
#   applied yet.
# - DATABASE_URL is a single fully-composed literal, not built from separate
#   DB_USERNAME/DB_PASSWORD/DB_HOST parts: Cloud Run env vars are NOT
#   shell-expanded, unlike docker-compose's env_file loading. A DATABASE_URL
#   containing literal `$DB_USERNAME` etc. (e.g. pasted straight from
#   .env/.env.example) will NOT be expanded here and will fail to connect.
#
# Deploy with:
#   gcloud run services replace cloud-run/service.yaml --region <region>
# or cloud-run/deploy.sh / cloudbuild.yaml, which also build the image first.

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fake-store-api
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        # Start db + datadog-agent before the app container.
        run.googleapis.com/container-dependencies: '{"app":["db","datadog-agent"]}'
    spec:
      containers:
        - name: app
          image: REGION-docker.pkg.dev/PROJECT_ID/fake-store-api/app:latest
          ports:
            - containerPort: 8765
          env:
            - name: DATABASE_URL
              value: mongodb://root:example@localhost:27017/fake_store?authSource=admin
            - name: JWT_SECRET
              value: change_me_dev_only
            - name: DD_AGENT_HOST
              value: localhost
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_SERVICE
              value: fake-store-api
            # Fill in with your own deployed Agent Studio agent's resource
            # name (projects/<PROJECT_NUMBER>/locations/<REGION>/reasoningEngines/<ID>)
            # - never commit a real one.
            - name: AGENT_ENGINE_RESOURCE_NAME
              value: ""
          resources:
            limits:
              cpu: "1"
              memory: 512Mi

        - name: db
          image: mongo:7
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: example
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          startupProbe:
            tcpSocket:
              port: 27017
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15

        - name: datadog-agent
          image: gcr.io/datadoghq/agent:latest
          env:
            - name: DD_SITE
              value: datadoghq.com
            # Cloud Run containers have no conventional resolvable hostname -
            # without this, the agent's hostname auto-detection fatally
            # errors ("unable to reliably determine the host name"), which
            # crash-loops the whole container and fails its startup probe.
            - name: DD_HOSTNAME
              value: fake-store-api-cloud-run
            - name: DD_APM_ENABLED
              value: "true"
            - name: DD_APM_NON_LOCAL_TRAFFIC
              value: "true"
            # Cloud Run sidecars can't mount /var/run/docker.sock, /proc, or
            # /sys/fs/cgroup like the docker-compose agent does, so host/
            # container-level metrics collection is not available here —
            # this sidecar is scoped to APM trace collection from the app.
            - name: DD_API_KEY
              value: REPLACE_ME
          resources:
            limits:
              cpu: "0.5"
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: 8126
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 15

      volumes:
        - name: mongo-data
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
