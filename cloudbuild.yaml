# Builds the app image once and deploys both Cloud Run services from it:
#   - fake-store-api (cloud-run/service.yaml)     - main app + db + datadog-agent
#   - fake-store-mcp (cloud-run/mcp-service.yaml)  - MCP server, for Agent Studio
#
# See docs/cloud-run-deploy.md for the full explanation. This file does the
# same thing as cloud-run/deploy.sh, but as a Cloud Build config - run it
# manually today, or point a Cloud Build trigger at it later for
# redeploy-on-push (see docs/cloud-run-deploy.md for why the trigger's
# default single-container auto-deploy flow doesn't work for this repo and
# needs to be pointed at this file instead).
#
# Prerequisites (not handled by this file - see docs/cloud-run-deploy.md):
#   - APIs enabled: run, artifactregistry, cloudbuild
#   - Artifact Registry repo "${_REPO}" in region "${_REGION}"
#   - The Cloud Build service account
#     (PROJECT_NUMBER@cloudbuild.gserviceaccount.com) needs:
#       roles/run.admin               (deploy the services, manage IAM on them)
#       roles/iam.serviceAccountUser  (act as the Cloud Run services' runtime SA)
#       roles/artifactregistry.writer (push the built image)
#
# Manual run:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-west1,_REPO=fake-store-api

steps:
  - name: gcr.io/cloud-builders/docker
    env:
      - IMAGE=${_IMAGE}
    script: |
      docker build -t ${IMAGE}:latest -t ${IMAGE}:$SHORT_SHA .
    id: BUILD
    waitFor: ["-"]

  - name: gcr.io/cloud-builders/docker
    env:
      - IMAGE=${_IMAGE}
    script: |
      docker push ${IMAGE}:latest
      docker push ${IMAGE}:$SHORT_SHA
    id: PUSH
    waitFor:
      - BUILD

  - name: ubuntu
    env:
      - IMAGE=${_IMAGE}
    script: |
      sed "s|REGION-docker.pkg.dev/PROJECT_ID/fake-store-api/app:latest|${IMAGE}:latest|" \
        cloud-run/service.yaml > /workspace/service.rendered.yaml
      sed "s|REGION-docker.pkg.dev/PROJECT_ID/fake-store-api/app:latest|${IMAGE}:latest|" \
        cloud-run/mcp-service.yaml > /workspace/mcp-service.rendered.yaml
    id: RENDER_SERVICE_YAML
    waitFor: ["-"]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    env:
      - REGION=${_REGION}
    script: |
      gcloud run services replace /workspace/service.rendered.yaml --region ${REGION} --quiet
    id: DEPLOY_APP
    waitFor:
      - PUSH
      - RENDER_SERVICE_YAML

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    env:
      - REGION=${_REGION}
    script: |
      gcloud run services add-iam-policy-binding fake-store-api \
        --region ${REGION} --member=allUsers --role=roles/run.invoker --quiet
    id: ALLOW_UNAUTH_APP
    waitFor:
      - DEPLOY_APP

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    env:
      - REGION=${_REGION}
    script: |
      gcloud run services replace /workspace/mcp-service.rendered.yaml --region ${REGION} --quiet
    id: DEPLOY_MCP
    waitFor:
      - PUSH
      - RENDER_SERVICE_YAML

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    env:
      - REGION=${_REGION}
    script: |
      gcloud run services add-iam-policy-binding fake-store-mcp \
        --region ${REGION} --member=allUsers --role=roles/run.invoker --quiet
    id: ALLOW_UNAUTH_MCP
    waitFor:
      - DEPLOY_MCP

substitutions:
  _REGION: us-west1
  _REPO: fake-store-api
  _IMAGE: ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/app

images:
  - ${_IMAGE}:latest
  - ${_IMAGE}:$SHORT_SHA

options:
  dynamic_substitutions: true
  logging: CLOUD_LOGGING_ONLY
