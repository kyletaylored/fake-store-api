services:
  app:
    build: .
    env_file:
      - .env
    environment:
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: 8126
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db
      - datadog-agent
  mcp:
    build: .
    command: ["node", "mcp/http-server.js"]
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "${MCP_PORT:-3333}:${MCP_PORT:-3333}"
    depends_on:
      - db
  db:
    image: mongo
    restart: always
    volumes:
      - ./mongo_data:/data/db
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME?MongoDB username}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD?MongoDB password}
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    env_file:
      - .env
    environment:
      DD_API_KEY: ${DD_API_KEY?Datadog API key}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro